name: Run testflows tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

env:
  GRAFANA_VERSION: "12.4.0"
  testflows_logs: |
    ./testflows_logs/*
  selenium_logs: |
    ./selenium_logs/*

jobs:
  tests:
    # runs-on: [ self-hosted, on-demand, type-cpx41, image-x86-system-ubuntu-22.04 ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - group: window-functions
            suite: "window_functions"
          - group: sql-editor
            suite: "sql_editor"
          - group: data-source-setup-connection
            suite: "data_source_setup_connection"
          - group: data-source-setup-settings
            suite: "data_source_setup_settings"
          - group: data-source-setup-defaults
            suite: "data_source_setup_defaults"
          - group: e2e
            suite: "e2e"
          - group: query-options
            suite: "query_options"
          - group: functions
            suite: "functions"
          - group: macros
            suite: "macros"
          - group: adhoc-macro
            suite: "adhoc_macro"
          - group: unified-alerts
            suite: "unified_alerts"
          - group: template-variables-editor
            suite: "template_variables_editor"
          - group: legacy-alerts
            suite: "legacy_alerts"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: tests/testflows/infra/setup.sh

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tests/testflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run Altinity Grafana Plugin tests (${{ matrix.group }})
        run: cd ./tests/testflows/ &&
          python3
          -u ./regression.py --before=0.1 --after=0.1
          --suite ${{ matrix.suite }}
          --log raw.log
          -o short

      - name: Create reports
        if: always()
        run: tests/testflows/infra/create-report.sh

      - name: Upload raw coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-coverage-${{ matrix.group }}
          path: |
            go_coverage/raw/
            tests/testflows/coverage/raw/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testflows-logs-${{ matrix.group }}
          path: ${{ env.testflows_logs}}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-logs-${{ matrix.group }}
          path: ${{ env.selenium_logs}}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.group }}
          path: tests/testflows/screenshots/
          if-no-files-found: ignore

  coverage:
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Download all raw coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: raw-coverage-*
          path: raw-coverage

      - name: Merge and generate backend coverage
        run: |
          mkdir -p go_coverage/raw
          for dir in raw-coverage/*/go_coverage/raw/; do
            cp -r "$dir"* go_coverage/raw/ 2>/dev/null || true
          done
          if ls go_coverage/raw/cov* 1>/dev/null 2>&1; then
            go tool covdata textfmt -i=go_coverage/raw -o=go_coverage/coverage.txt
            go tool cover -html=go_coverage/coverage.txt -o=go_coverage/coverage.html
          else
            echo "No backend coverage data found"
          fi

      - name: Merge and generate frontend coverage
        run: |
          mkdir -p .nyc_output
          for dir in raw-coverage/*/tests/testflows/coverage/raw/; do
            cp -r "$dir"* .nyc_output/ 2>/dev/null || true
          done
          if ls .nyc_output/* 1>/dev/null 2>&1; then
            if [ -f coverage/coverage-final.json ]; then
              cp coverage/coverage-final.json .nyc_output/
            fi
            npx nyc report --reporter html --reporter=lcov --report-dir=./tests/testflows/coverage
          else
            echo "No frontend coverage data found"
          fi

      - name: Report coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: tests/testflows/coverage/lcov.info go_coverage/coverage.txt

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            go_coverage/coverage.html
            go_coverage/coverage.txt
            tests/testflows/coverage/
          if-no-files-found: ignore
