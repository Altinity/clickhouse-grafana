name: Run testflows tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  prepare-frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: .npm-cache
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build frontend with coverage instrumentation
        run: |
          mkdir -p node_modules .npm-cache tests/testflows/coverage/raw
          docker compose run --rm \
            -v "$(pwd)/.npm-cache:/root/.npm" \
            frontend_coverage_builder

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: build-frontend
          path: dist/

  prepare-backend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: .go-cache
          key: ${{ runner.os }}-go-cache-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-

      - name: Build backend with coverage
        run: |
          mkdir -p .go-cache go_coverage/raw
          docker compose run --rm backend_coverage_builder

      - name: Upload backend build
        uses: actions/upload-artifact@v7
        with:
          name: build-backend
          path: |
            dist/
            go_coverage/

  # Required leg: pinned Grafana version, gates the build.
  tests-fixed:
    name: fixed / ${{ matrix.suite.group }}
    needs: [prepare-frontend-build, prepare-backend-build]
    # runs-on: [ self-hosted, on-demand, type-cpx41, image-x86-system-ubuntu-22.04 ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    timeout-minutes: 60

    env:
      SKIP_BUILDERS: "1"

    strategy:
      fail-fast: false
      matrix:
        suite:
          - { group: window-functions,              name: window_functions }
          - { group: sql-editor,                    name: sql_editor }
          - { group: data-source-setup-connections, name: data_source_setup_connections }
          - { group: data-source-setup-defaults,    name: data_source_setup_defaults }
          - { group: e2e,                           name: e2e }
          - { group: query-options,                 name: query_options }
          - { group: functions,                     name: functions }
          - { group: macros,                        name: macros }
          - { group: adhoc-macro,                   name: adhoc_macro }
          - { group: unified-alerts,                name: unified_alerts }
          - { group: template-variables-editor,     name: template_variables_editor }
          # legacy_alerts always runs against its own pinned Grafana 10.4.3
          # service, so it lives only in this leg, sharded to cut the wall-clock tail.
          - { group: legacy-alerts-1, name: legacy_alerts, scenario: "check_red_alert,check_green_alert" }
          - { group: legacy-alerts-2, name: legacy_alerts, scenario: "check_green_into_red_alert,check_red_into_green_alert" }
          - { group: conditional-test,              name: conditional_test }
          - { group: search-filter,                 name: search_filter }
          - { group: flamegraph-and-tracing,        name: flamegraph_and_tracing }
          - { group: limited-access,                name: limited_access }
          - { group: worldmap-and-table-format,     name: worldmap_and_table_format }
          - { group: log-context,                   name: log_context }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run suite
        uses: ./.github/actions/testflows-suite
        with:
          suite-group: ${{ matrix.suite.group }}
          suite-name: ${{ matrix.suite.name }}
          scenario: ${{ matrix.suite.scenario || '' }}
          grafana-version: "13.1.0"
          grafana-label: fixed

  # Informational leg: tracks the latest Grafana release. A failure marks the
  # job red (visible in the UI) but does not fail the workflow run.
  tests-latest:
    name: latest / ${{ matrix.suite.group }}
    needs: [prepare-frontend-build, prepare-backend-build]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      checks: write

    timeout-minutes: 60

    env:
      SKIP_BUILDERS: "1"

    strategy:
      fail-fast: false
      matrix:
        suite:
          - { group: window-functions,              name: window_functions }
          - { group: sql-editor,                    name: sql_editor }
          - { group: data-source-setup-connections, name: data_source_setup_connections }
          - { group: data-source-setup-defaults,    name: data_source_setup_defaults }
          - { group: e2e,                           name: e2e }
          - { group: query-options,                 name: query_options }
          - { group: functions,                     name: functions }
          - { group: macros,                        name: macros }
          - { group: adhoc-macro,                   name: adhoc_macro }
          - { group: unified-alerts,                name: unified_alerts }
          - { group: template-variables-editor,     name: template_variables_editor }
          - { group: conditional-test,              name: conditional_test }
          - { group: search-filter,                 name: search_filter }
          - { group: flamegraph-and-tracing,        name: flamegraph_and_tracing }
          - { group: limited-access,                name: limited_access }
          - { group: worldmap-and-table-format,     name: worldmap_and_table_format }
          - { group: log-context,                   name: log_context }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run suite
        uses: ./.github/actions/testflows-suite
        with:
          suite-group: ${{ matrix.suite.group }}
          suite-name: ${{ matrix.suite.name }}
          grafana-version: "latest"
          grafana-label: latest

  coverage:
    needs: tests-fixed
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Download fixed-run raw coverage artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: raw-coverage-*-fixed
          path: raw-coverage

      - name: Merge and generate backend coverage
        run: |
          mkdir -p go_coverage/raw
          for dir in raw-coverage/*/go_coverage/raw/; do
            cp -r "$dir"* go_coverage/raw/ 2>/dev/null || true
          done
          if ls go_coverage/raw/cov* 1>/dev/null 2>&1; then
            go tool covdata textfmt -i=go_coverage/raw -o=go_coverage/coverage.txt
            go tool cover -html=go_coverage/coverage.txt -o=go_coverage/coverage.html
          else
            echo "No backend coverage data found"
          fi

      - name: Normalize frontend coverage paths
        run: |
          for f in raw-coverage/*/tests/testflows/coverage/raw/*.json; do
            [ -f "$f" ] || continue
            jq '
              with_entries(
                .key |= sub("^/grafana-clickhouse/"; "") |
                .value.path |= sub("^/grafana-clickhouse/"; "")
              )
            ' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Merge and generate frontend coverage
        run: |
          mkdir -p .nyc_output
          for dir in raw-coverage/*/tests/testflows/coverage/raw/; do
            cp -r "$dir"* .nyc_output/ 2>/dev/null || true
          done
          if ls .nyc_output/* 1>/dev/null 2>&1; then
            if [ -f coverage/coverage-final.json ]; then
              cp coverage/coverage-final.json .nyc_output/
            fi
            npx nyc report --temp-dir .nyc_output --reporter html --reporter=lcov --report-dir=./tests/testflows/coverage
          else
            echo "No frontend coverage data found"
          fi

      - name: Verify frontend coverage
        run: |
          if [ ! -s tests/testflows/coverage/lcov.info ]; then
            echo "::error::lcov.info is empty or missing — frontend coverage was not generated"
            exit 1
          fi
          echo "Frontend coverage generated successfully:"
          grep '^SF:' tests/testflows/coverage/lcov.info | head
          grep -c '^SF:src/' tests/testflows/coverage/lcov.info || {
            echo "::error::No SF:src/ entries found in lcov.info"
            exit 1
          }

      - name: Report coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: tests/testflows/coverage/lcov.info go_coverage/coverage.txt

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: |
            go_coverage/coverage.html
            go_coverage/coverage.txt
            tests/testflows/coverage/
          if-no-files-found: ignore
